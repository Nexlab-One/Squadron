apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hiveworkerpools.hive.io
spec:
  group: hive.io
  names:
    kind: HiveWorkerPool
    listKind: HiveWorkerPoolList
    plural: hiveworkerpools
    singular: hiveworkerpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [companyRef, workerImage]
              properties:
                companyRef:
                  type: string
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 50
                  default: 1
                workerImage:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    type: object
                resources:
                  type: object
                adapterConfig:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                healthyAgents:
                  type: integer
                lastSyncAt:
                  type: string
                syncedAgentIds:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
