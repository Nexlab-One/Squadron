apiVersion: v1
kind: Namespace
metadata:
  name: hive-storage
  labels:
    hive.io/storage: "true"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: hive-storage
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: username
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: password
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: hive-storage
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: hive-storage
type: Opaque
stringData:
  username: minioadmin
  password: minioadmin
