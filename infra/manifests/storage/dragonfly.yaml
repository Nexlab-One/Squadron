apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dragonfly
  namespace: hive-storage
spec:
  serviceName: dragonfly
  replicas: 1
  selector:
    matchLabels:
      app: dragonfly
  template:
    metadata:
      labels:
        app: dragonfly
    spec:
      containers:
        - name: dragonfly
          image: dragonflydb/dragonfly:latest
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  namespace: hive-storage
spec:
  selector:
    app: dragonfly
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
