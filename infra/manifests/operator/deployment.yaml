apiVersion: v1
kind: Namespace
metadata:
  name: hive-system
  labels:
    hive.io/system: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hive-operator
  namespace: hive-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hive-operator
rules:
  - apiGroups: ["hive.io"]
    resources: ["hiveclusters", "hivecompanies", "hiveworkerpools"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["hive.io"]
    resources: ["hiveclusters/status", "hivecompanies/status", "hiveworkerpools/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "services", "persistentvolumeclaims", "resourcequotas"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hive-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hive-operator
subjects:
  - kind: ServiceAccount
    name: hive-operator
    namespace: hive-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-operator
  namespace: hive-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-operator
  template:
    metadata:
      labels:
        app: hive-operator
    spec:
      serviceAccountName: hive-operator
      containers:
        - name: manager
          image: hive-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
