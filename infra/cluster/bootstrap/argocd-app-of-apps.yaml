apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/enkom/paperclip
    path: infra/cluster/applications
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
