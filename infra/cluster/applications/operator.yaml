apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/enkom/paperclip
    path: infra/manifests/operator
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: hive-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
